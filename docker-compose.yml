# ============================================================
# Cipher - Local + Production Docker Compose
#
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose --profile production up -d
# ============================================================

services:
  # --- Redis (task queue + cache) ---
  redis:
    image: redis:7-alpine
    container_name: cipher-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Cipher API Server ---
  cipher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cipher-api
    ports:
      - "127.0.0.1:8000:8000"    # Bind to localhost ONLY in development
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cipher-redis-2026}@redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/cipher.db}
    volumes:
      - cipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # --- Celery Worker (background tasks) ---
  worker:
    build: .
    container_name: cipher-worker
    command: >
      celery -A app.services.tasks worker
      --loglevel=info
      --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cipher-redis-2026}@redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/cipher.db}
    volumes:
      - cipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # --- Celery Beat (scheduled tasks) ---
  beat:
    build: .
    container_name: cipher-beat
    command: >
      celery -A app.services.tasks beat
      --loglevel=info
      --schedule=/app/data/celerybeat-schedule
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cipher-redis-2026}@redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/cipher.db}
    volumes:
      - cipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # --- Nginx Reverse Proxy (production profile) ---
  nginx:
    image: nginx:1.27-alpine
    container_name: cipher-nginx
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      cipher:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cipher-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
