# ============================================================
# Cipher - Production Docker Compose (Elysian Protocol)
#
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose --profile production up -d
#   Monitoring:   docker compose --profile monitoring up -d
# ============================================================

services:
  # --- Cipher API Server ---
  cipher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cipher-api
    ports:
      - "127.0.0.1:8000:8000"    # Bind to localhost ONLY — never 0.0.0.0 in production
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-development}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - cipher-data:/app/data          # Persist SQLite + ChromaDB
      - ./dashboard:/app/dashboard      # Dashboard hot-reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 8G           # M5 Max 48GB — plenty of headroom
          cpus: "4.0"
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=256M

  # --- Redis (task queue + caching) ---
  redis:
    image: redis:7-alpine
    container_name: cipher-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-cipher-redis-2026}
      --appendonly yes
      --save 60 1000
    ports:
      - "127.0.0.1:6379:6379"    # Localhost only
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cipher-redis-2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

  # --- Celery Worker (background tasks: overnight training, scanners) ---
  worker:
    build: .
    container_name: cipher-worker
    command: >
      celery -A app.services.tasks worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      --without-heartbeat
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cipher-redis-2026}@redis:6379/0
    volumes:
      - cipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      cipher:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # --- Celery Beat (scheduled tasks: scanner intervals, overnight training trigger) ---
  beat:
    build: .
    container_name: cipher-beat
    command: >
      celery -A app.services.tasks beat
      --loglevel=info
      --schedule=/app/data/celerybeat-schedule
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cipher-redis-2026}@redis:6379/0
    volumes:
      - cipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  # --- Nginx Reverse Proxy (production profile) ---
  nginx:
    image: nginx:1.27-alpine
    container_name: cipher-nginx
    profiles: ["production"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      cipher:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32M
      - /var/run:size=16M

  # --- Watchtower (auto-update containers — production profile) ---
  watchtower:
    image: containrrr/watchtower
    container_name: cipher-watchtower
    profiles: ["production"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400    # Check once daily
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=false
    restart: unless-stopped

volumes:
  cipher-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
