# Fly.io deployment configuration
# Deploy: fly launch && fly deploy

app = "orchid-elysian"
primary_region = "ewr"  # Newark, NJ (closest to Philly)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  source = "orchid_data"
  destination = "/app/data"
