# ============================================================
# Cipher - Nginx Reverse Proxy (Elysian Protocol)
# Handles: SSL termination, rate limiting, SSE streaming
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    client_max_body_size 50M;    # Support 10 image uploads

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # --- Rate Limiting ---
    # 10 requests/sec per IP for API, burst 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # 2 requests/sec for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    # --- Upstream ---
    upstream cipher_backend {
        server cipher:8000;
        keepalive 32;
    }

    # --- HTTP → HTTPS Redirect ---
    server {
        listen 80;
        server_name _;

        # Health check (no redirect)
        location /health {
            return 200 "ok";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certs (use Tailscale certs or Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- API Endpoints ---
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://cipher_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running LLM calls
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # --- SSE Streaming Endpoint (critical for Cipher) ---
        location /api/v1/chat/stream {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://cipher_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific: disable buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;

            # Long timeout for streaming responses
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # --- Auth Endpoints (stricter rate limit) ---
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://cipher_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Dashboard ---
        location /dashboard/ {
            proxy_pass http://cipher_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Health Check ---
        location /ping {
            proxy_pass http://cipher_backend;
        }

        # Block everything else
        location / {
            return 404;
        }
    }
}
